services:
  - type: web
    name: novaroom-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run migrate
    startCommand: npm start
    healthCheckPath: /api/v1/live
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: PAYLOAD_LIMIT
        value: 10mb
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "300"
